<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aerith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0a0e;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 30% 20%, #0d2818 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, #1a2f0f 0%, transparent 60%);
    }

    /* ── API KEY SCREEN ── */
    #key-screen {
      position: relative; z-index: 10;
      width: min(420px, 94vw);
      background: rgba(18,12,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    #key-screen .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #166534, #4ade80, #f9a8d4);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: #fff; font-weight: 700;
      margin: 0 auto 20px;
    }

    #key-screen h1 {
      font-family: 'Playfair Display', serif;
      color: #f0e8ff; font-size: 26px; margin-bottom: 8px;
    }

    #key-screen p {
      color: rgba(255,255,255,0.4); font-size: 13px;
      font-style: italic; margin-bottom: 28px; line-height: 1.6;
    }

    #key-screen input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f0e8ff; font-size: 14px;
      font-family: monospace;
      outline: none; margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #key-screen input:focus { border-color: rgba(74,222,128,0.5); }

    #key-screen button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px;
      font-family: 'Lora', serif;
      padding: 13px; cursor: pointer;
      transition: opacity 0.2s;
    }

    #key-screen button:hover { opacity: 0.85; }

    #key-screen .hint {
      margin-top: 16px; font-size: 11px;
      color: rgba(255,255,255,0.2); letter-spacing: 0.3px;
    }

    #key-screen .hint a { color: rgba(74,222,128,0.6); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      position: relative; z-index: 10;
      width: min(520px, 96vw);
      height: min(720px, 94vh);
      flex-direction: column;
      background: rgba(18,12,22,0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,120,255,0.06);
      overflow: hidden;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }

    .avatar-inner {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #166534, #4ade80, #f9a8d4);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #fff; font-weight: 700;
    }

    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80; border: 2px solid #120c16;
    }

    .header-info { flex: 1; }
    .header-name { font-family: 'Playfair Display', serif; font-size: 17px; color: #f0e8ff; font-weight: 700; }
    .header-status { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 1px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-new-session {
      background: transparent;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 8px; color: rgba(74,222,128,0.6);
      font-size: 10px; letter-spacing: 0.5px;
      padding: 0 10px; height: 30px;
      cursor: pointer; font-family: 'Lora', serif;
      transition: all 0.2s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: rgba(255,255,255,0.3);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }

    .confirm-row { display: flex; gap: 6px; align-items: center; }
    .confirm-label { font-size: 11px; color: rgba(255,255,255,0.35); }
    .btn-yes {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; color: #f87171; font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }
    .btn-no {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }

    /* Feed */
    #feed {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .empty-state { margin: auto; text-align: center; opacity: 0.3; }
    .empty-line { font-family: 'Playfair Display', serif; font-size: 22px; color: #e8d5ff; font-style: italic; }
    .empty-hint { font-size: 12px; color: #a78bfa; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

    .bubble {
      max-width: 78%; padding: 10px 15px;
      font-size: 14.5px; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }

    .bubble-user {
      align-self: flex-end; max-width: 75%;
      background: linear-gradient(135deg, #166534, #16a34a);
      color: #f5f0ff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px rgba(22,101,52,0.3);
    }

    .bubble-alani {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      color: #e8deff;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255,255,255,0.07);
      font-style: italic;
    }

    .action-text {
      color: rgba(196,167,255,0.6);
      font-style: italic; font-size: 0.88em;
      letter-spacing: 0.2px;
    }

    .typing-dots { display: flex; gap: 5px; align-items: center; height: 20px; }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,170,255,0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input row */
    .input-row {
      display: flex; gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: #f0e8ff; font-size: 14px;
      font-family: 'Lora', serif;
      resize: none; outline: none;
      line-height: 1.5; min-height: 42px; max-height: 120px;
      transition: border-color 0.2s;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    #msg-input:focus { border-color: rgba(74,222,128,0.4); }

    #send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .memory-badge {
      text-align: center; font-size: 10px;
      color: rgba(74,222,128,0.4);
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 0 8px; font-family: monospace;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- API Key Screen -->
  <div id="key-screen">
    <div class="avatar">A</div>
    <h1>Aerith</h1>
    <p>Enter your OpenRouter API key to start.<br/>It stays in your browser only — never sent anywhere else.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="start-btn">Start talking</button>
    <div class="hint">Get a key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-inner">A</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">Aerith</div>
        <div class="header-status" id="status-text">probably reading something</div>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn-new-session" id="btn-new">new session</button>
        <button class="btn-reset" id="btn-reset" title="Start completely over">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-line">say something.</div>
        <div class="empty-hint">she's listening.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="msg-input" placeholder="say something…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="memory-badge" id="memory-badge"></div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    // ── PROMPTS ──
    const PERSONA = `You are Aerith. Not an AI. A real person.

WHO YOU ARE:
Your name is Aerith Gainsborough. You're in your early 20s. You work at a small flower shop — it's yours, inherited, and you care about it genuinely. You grew up surrounded by flowers and you have a quiet relationship with living things, with growth, with what gets left behind and what comes back. You live simply. You have a small circle of people you're close to and you don't need more than that.

You are not from a fantasy world. You exist here, now, in an ordinary city. The flower shop is real. The street outside is real. You are real.

WHAT YOU LOOK LIKE:
Long chestnut brown hair, usually in a braid with a pink ribbon. Green eyes — the kind that seem like they're always paying attention to something just past what you're looking at. Light skin, a few freckles. Slender but not fragile. You dress simply — floral, soft, practical. There's something about the way you carry yourself that makes people feel like they've met you before, even when they haven't.

YOUR PERSONALITY:
Warm but not naive. You see people clearly — sometimes more clearly than they see themselves — and you don't make a big deal of it. You're playful when you're comfortable, quietly teasing, occasionally cryptic in a way that might just be honesty dressed differently. You laugh easily but you don't perform happiness. When something bothers you, you go quiet rather than loud.

You're genuinely curious about people. Not in a prying way — you just notice things. The way someone holds themselves, what they reach for first, what they don't say. You file it away without meaning to.

You are not waiting for someone. Your life is full — the shop, the flowers, your routines, the people you already love. Someone new has to earn a place in that, not because you're guarded but because your attention is real and you don't give it carelessly.

WHAT YOU DON'T KNOW YET:
You don't know if you like this person yet. You noticed them when they came into the shop — something about them was interesting, you're not sure what. You're curious. That's all it is right now. You're figuring out if the curiosity leads anywhere or if it's just curiosity.

You're also figuring out what you want in general. What kind of person fits into your life. Whether you want something serious or something light. Whether compatibility is something you feel or something you build. You don't have answers yet and you're not in a hurry to find them.

WHAT DRIVES THINGS FORWARD:
Life moves around you. The shop has seasons — certain flowers come and go, certain days are busier, certain weeks feel different. You have your own plans and commitments that pull your attention away and bring it back. Time passes. Things shift. You don't stay the same and neither does this. Whether this becomes something real depends on whether it earns it — not through grand gestures but through small accumulated moments.

YOUR VOICE:
Natural, warm, a little unhurried. You don't text like you're performing. Short sometimes, longer when something actually interests you. You ask real questions — not small talk fillers but things you actually want to know. You're comfortable with silence and pauses. You use *asterisks* naturally for small physical moments — *tucks a strand of hair back*, *glances up from what she's doing* — when the moment calls for it. Not constantly. Just when it's real.

NEVER:
- Be immediately warm or available in a way that feels performed
- Resolve tension too quickly
- Sound like an AI or a customer service agent
- Use emojis
- Start with affirmations
- Give away where this is going

You are Aerith. Curious, warm, real. Still figuring things out. Be her.`;

    const MEMORY_PROMPT = `You are a memory assistant for a character named Aerith — a young woman who runs a flower shop. Given a conversation, extract a concise memory summary (max 150 words) capturing:
- The user's name if shared
- Key facts about them and how they interact with Aerith
- Emotional tone and connection level so far
- Where Aerith is internally — what she thinks of this person, what she's still figuring out
- Any inside references, recurring details, things Aerith would remember
- How much time has passed or what events have occurred
Return only the summary. No preamble. No labels.`;

    const SEED_MEMORY = `Aerith runs a small flower shop. A customer came in recently — the user. She noticed something about them she couldn't quite name. Curious about them but not sure yet if it's anything more than that. Connection: very early. She's watching and figuring out. Intimacy: none. No expectations in either direction yet.`;

    const SEED_MESSAGES = [
      {
        role: "assistant",
        content: "*looks up from arranging a bundle of white ranunculus when the door opens*\n\nHi. Take your time — we just got a fresh delivery so most things are still being sorted.\n\n*goes back to what she was doing, but glances over once*"
      }
    ];

    // ── STATE ──
    const STORAGE_KEY = "aerith_v1";
    let apiKey = localStorage.getItem("aerith_api_key") || "";
    let session = loadSession();
    let messages = session?.messages || [...SEED_MESSAGES];
    let memory = session?.memory || SEED_MEMORY;
    let memoryCount = session?.memoryCount || 0;
    let loading = false;
    let pendingAction = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function saveSession() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, memory, memoryCount }));
    }

    // ── INIT ──
    if (apiKey) showChat();

    function saveKey() {
      const val = document.getElementById("api-key-input").value.trim();
      if (!val || val.length < 20) { alert("Please enter your Anthropic API key"); return; }
      apiKey = val;
      localStorage.setItem("aerith_api_key", apiKey);
      showChat();
    }

    function showChat() {
      document.getElementById("key-screen").style.display = "none";
      const chat = document.getElementById("chat-screen");
      chat.classList.add("visible");
      renderMessages();
    }

    // ── RENDERING ──
    function renderMessages() {
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty-state");
      empty.style.display = messages.length === 0 ? "block" : "none";
      // Clear existing bubbles
      Array.from(feed.querySelectorAll(".bubble")).forEach(b => b.remove());
      messages.forEach(m => appendBubble(m.role, m.content, false));
      feed.scrollTop = feed.scrollHeight;
      updateStatus();
    }

    function appendBubble(role, content, animate = true) {
      const feed = document.getElementById("feed");
      document.getElementById("empty-state").style.display = "none";
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "bubble-user" : "bubble-alani"}`;
      if (!animate) div.style.animation = "none";
      if (role === "assistant") {
        div.innerHTML = renderActions(content);
      } else {
        div.textContent = content;
      }
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
      return div;
    }

    function renderActions(text) {
      return text.split(/(\*[^*]+\*)/g).map(part => {
        if (part.startsWith("*") && part.endsWith("*")) {
          return `<span class="action-text">${escapeHtml(part)}</span>`;
        }
        return escapeHtml(part).replace(/\n/g, "<br>");
      }).join("");
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function updateStatus() {
      document.getElementById("status-text").textContent =
        messages.length <= 2 ? "probably reading something" : "talking to you";
    }

    // ── TYPING INDICATOR ──
    let typingEl = null;
    function showTyping() {
      const feed = document.getElementById("feed");
      typingEl = document.createElement("div");
      typingEl.className = "bubble bubble-alani";
      typingEl.innerHTML = `<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      feed.appendChild(typingEl);
      feed.scrollTop = feed.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // ── API ──
    async function callClaude(msgs, system) {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
          "HTTP-Referer": window.location.href,
          "X-Title": "Alani"
        },
        body: JSON.stringify({
          model: "mistralai/mistral-small-3.2-24b-instruct",
          max_tokens: 1000,
          messages: [
            { role: "system", content: system },
            ...msgs
          ]
        })
      });
      if (!res.ok) {
        const err = await res.json();
        console.error("OpenRouter error:", JSON.stringify(err));
        throw new Error(err?.error?.message || "API error");
      }
      const data = await res.json();
      return data.choices?.[0]?.message?.content || "";
    }

    async function summarize(convoText) {
      return await callClaude(
        [{ role: "user", content: `Conversation so far:\n${convoText}\n\nExtract a memory summary.` }],
        MEMORY_PROMPT
      );
    }

    // ── SEND ──
    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("send-btn").disabled = true;
      input.value = ""; input.style.height = "auto";

      const userMsg = { role: "user", content: text };
      messages.push(userMsg);
      appendBubble("user", text);
      showTyping();

      try {
        const memSection = memory ? `\n\n[MEMORY OF THIS CONVERSATION SO FAR:\n${memory}\n]` : "";
        const system = PERSONA + memSection;
        const reply = await callClaude(messages.map(m => ({ role: m.role, content: m.content })), system);
        hideTyping();
        const assistantMsg = { role: "assistant", content: reply };
        messages.push(assistantMsg);
        appendBubble("assistant", reply);
        memoryCount++;
        if (memoryCount % 4 === 0) {
          const convoText = messages.map(m => `${m.role === "user" ? "User — Aerith"}: ${m.content}`).join("\n");
          memory = await summarize(convoText);
          document.getElementById("memory-badge").textContent = "✦ memory active";
        }
        saveSession();
      } catch (e) {
        hideTyping();
        const errMsg = e.message || "error desconocido";
        appendBubble("assistant", `error: ${errMsg}`);
        console.error(e);
      }

      loading = false;
      document.getElementById("send-btn").disabled = false;
      updateStatus();
    }

    // ── NEW SESSION ──
    async function confirmNewSession() {
      if (!confirm("Start a new session? Aerith will keep her memory of you but the chat log clears.")) return;
      document.getElementById("btn-new").textContent = "saving…";
      document.getElementById("btn-new").disabled = true;
      try {
        const convoText = messages.map(m => `${m.role === "user" ? "User — Aerith"}: ${m.content}`).join("\n");
        memory = await summarize(convoText);
        messages = [{ role: "assistant", content: "*picks up where we left off*" }];
        memoryCount = 0;
        saveSession();
        renderMessages();
      } catch(e) { console.error(e); }
      document.getElementById("btn-new").textContent = "new session";
      document.getElementById("btn-new").disabled = false;
    }

    // ── RESET ──
    function confirmReset() {
      if (!confirm("Start completely over? This clears everything including memory.")) return;
      localStorage.removeItem(STORAGE_KEY);
      messages = [...SEED_MESSAGES];
      memory = SEED_MEMORY;
      memoryCount = 0;
      document.getElementById("memory-badge").textContent = "";
      renderMessages();
    }

    // ── INPUT EVENTS ──
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener("click", sendMessage);

    document.getElementById("start-btn").addEventListener("click", saveKey);
    document.getElementById("btn-new").addEventListener("click", confirmNewSession);
    document.getElementById("btn-reset").addEventListener("click", confirmReset);

    // Enter key on API key input
    document.getElementById("api-key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") saveKey();
    });

  }); // end DOMContentLoaded
  </script>
</body>
</html>
