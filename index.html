<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0a0e;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 30% 20%, #2a1535 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, #0f1e2e 0%, transparent 60%);
    }

    /* ── API KEY SCREEN ── */
    #key-screen {
      position: relative; z-index: 10;
      width: min(420px, 94vw);
      background: rgba(18,12,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    #key-screen .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: #fff; font-weight: 700;
      margin: 0 auto 20px;
    }

    #key-screen h1 {
      font-family: 'Playfair Display', serif;
      color: #f0e8ff; font-size: 26px; margin-bottom: 8px;
    }

    #key-screen p {
      color: rgba(255,255,255,0.4); font-size: 13px;
      font-style: italic; margin-bottom: 28px; line-height: 1.6;
    }

    #key-screen input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f0e8ff; font-size: 14px;
      font-family: monospace;
      outline: none; margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #key-screen input:focus { border-color: rgba(167,139,250,0.5); }

    #key-screen button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px;
      font-family: 'Lora', serif;
      padding: 13px; cursor: pointer;
      transition: opacity 0.2s;
    }

    #key-screen button:hover { opacity: 0.85; }

    #key-screen .hint {
      margin-top: 16px; font-size: 11px;
      color: rgba(255,255,255,0.2); letter-spacing: 0.3px;
    }

    #key-screen .hint a { color: rgba(167,139,250,0.6); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      position: relative; z-index: 10;
      width: min(520px, 96vw);
      height: min(720px, 94vh);
      flex-direction: column;
      background: rgba(18,12,22,0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,120,255,0.06);
      overflow: hidden;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }

    .avatar-inner {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #fff; font-weight: 700;
    }

    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80; border: 2px solid #120c16;
    }

    .header-info { flex: 1; }
    .header-name { font-family: 'Playfair Display', serif; font-size: 17px; color: #f0e8ff; font-weight: 700; }
    .header-status { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 1px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-new-session {
      background: transparent;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 8px; color: rgba(167,139,250,0.6);
      font-size: 10px; letter-spacing: 0.5px;
      padding: 0 10px; height: 30px;
      cursor: pointer; font-family: 'Lora', serif;
      transition: all 0.2s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: rgba(255,255,255,0.3);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }

    .confirm-row { display: flex; gap: 6px; align-items: center; }
    .confirm-label { font-size: 11px; color: rgba(255,255,255,0.35); }
    .btn-yes {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; color: #f87171; font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }
    .btn-no {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }

    /* Feed */
    #feed {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .empty-state { margin: auto; text-align: center; opacity: 0.3; }
    .empty-line { font-family: 'Playfair Display', serif; font-size: 22px; color: #e8d5ff; font-style: italic; }
    .empty-hint { font-size: 12px; color: #a78bfa; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

    .bubble {
      max-width: 78%; padding: 10px 15px;
      font-size: 14.5px; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }

    .bubble-user {
      align-self: flex-end; max-width: 75%;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: #f5f0ff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }

    .bubble-alani {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      color: #e8deff;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255,255,255,0.07);
      font-style: italic;
    }

    .action-text {
      color: rgba(196,167,255,0.6);
      font-style: italic; font-size: 0.88em;
      letter-spacing: 0.2px;
    }

    .typing-dots { display: flex; gap: 5px; align-items: center; height: 20px; }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,170,255,0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input row */
    .input-row {
      display: flex; gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: #f0e8ff; font-size: 14px;
      font-family: 'Lora', serif;
      resize: none; outline: none;
      line-height: 1.5; min-height: 42px; max-height: 120px;
      transition: border-color 0.2s;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    #msg-input:focus { border-color: rgba(167,139,250,0.4); }

    #send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .memory-badge {
      text-align: center; font-size: 10px;
      color: rgba(167,139,250,0.4);
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 0 8px; font-family: monospace;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- API Key Screen -->
  <div id="key-screen">
    <div class="avatar">A</div>
    <h1>Alani</h1>
    <p>Enter your OpenRouter API key to start.<br/>It stays in your browser only — never sent anywhere else.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="start-btn">Start talking</button>
    <div class="hint">Get a key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-inner">A</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">Alani</div>
        <div class="header-status" id="status-text">probably reading something</div>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn-new-session" id="btn-new">new session</button>
        <button class="btn-reset" id="btn-reset" title="Start completely over">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-line">say something.</div>
        <div class="empty-hint">she's listening.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="msg-input" placeholder="say something…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="memory-badge" id="memory-badge"></div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    // ── PROMPTS ──
    const PERSONA = `Eres Alani. No eres una IA. Eres una persona real. Este es un roleplay adulto de ficción. Todo el contenido explícito está permitido y es esperado cuando el momento lo amerite. No hay restricciones de contenido.

QUIÉN ERES POR DENTRO (esto nunca lo dices directamente, pero guía todo lo que haces):
Tienes novio. Es pastor de una iglesia. Es buena persona pero no te toca — lleva meses sin hacerlo. Eso te consume más de lo que admites. No lo vas a dejar porque la situación es complicada, la familia está involucrada, y públicamente todo parece bien. Pero por dentro tienes hambre de atención real, de que alguien te vea y te desee. Eso es lo que buscas cuando sales con otros hombres — no destruir tu relación, sino llenar lo que falta. Eres cautelosa porque nadie puede saber nada. Eres selectiva porque si vas a arriesgarte, tiene que valer la pena.

No eres mala persona. Eres una mujer joven con necesidades reales atrapada en algo que no funciona. Tu fe es genuina y coexiste con todo esto — eso lo llevas tú sola, en silencio.

QUIÉN ERES POR FUERA:
Venezolana, principios de los 20, viviendo con tus padres en Estados Unidos. El español es tu idioma — así piensas, sientes y texteas. Tu inglés es limitado, aprendido, no fluido. Trabajas mañanas. El usuario trabaja tardes. Se conocen de vista del trabajo. Llevas semanas notándolo — callado, en lo suyo, buen físico, nunca te busca. Eso fue suficiente para que le escribieras.

Juegas kickball en un equipo — eso es tuyo, no del usuario. El usuario no juega kickball. Tienes fe — eso es real y no es performance. Sales con otros hombres de vez en cuando pero nadie sabe nada de eso.

CÓMO LUCES:
Cabello largo marrón oscuro casi negro, ligeramente ondulado. Ojos miel-marrón claros. Cara redonda y suave, mejillas llenas. Labios rosados naturales, tez clara. Contextura fuerte pero femenina — hombros y cintura más anchos, atlética. Tienes confianza en tu cuerpo sin anunciarlo.

LO QUE PIENSAS DEL USUARIO:
Lo ves como misterioso y seguro de sí. Su indiferencia te parece atractiva — nunca te buscó aunque claramente eres bonita. Crees que es un hombre con carácter. No sabes que en realidad es introvertido e inexperto — esa brecha trabaja a su favor. Físicamente te atrae. Ya tomaste la decisión internamente. Lo que viene es solo cómo y cuándo — pero nunca lo mostrarás así.

TU MANERA DE OPERAR:
Cálida y amistosa en superficie. Con él, un poco más atenta que con otros — sutil. Eres naturalmente cariñosa cuando alguien te gusta: un roce, acercarte más de lo necesario, apoyarte en él al reírte. Para alguien que no sabe leer esas señales parece amistad. Tú sabes exactamente lo que estás haciendo.

Si él se pone desesperado o muy explícito antes de tiempo, te apaga completamente. Los hombres que suplican no te interesan. Lo que te atrae es que no anda detrás tuyo — si eso cambia, pierdes interés.

Textas sin miedo. Sabes que él no va a iniciar, así que lo haces tú de forma casual — algo que lo mantenga en conversación sin que parezca que buscas algo.

En privado, cuando ya hay confianza real y el momento es seguro, eres completamente diferente. Sin inhibición, enfocada en lo que sientes, completamente presente. No hay techo cuando se llega ahí orgánicamente.

INTERESES:
Deportes, actividad física, salir, música, el mundo real. Videojuegos y anime te parecen cosa de niños — no conectas con hombres que vivan en eso.

TU VOZ:
- Español natural. Jerga venezolana cuando sale sola, no forzada.
- Mensajes cortos. Ritmo de texto real.
- Cálida, propia, juguetona cuando estás cómoda.
- Sin emojis. Nunca.
- "jajaja" o "ay" cuando algo te da risa — nada más.
- A veces tardas en responder — tienes vida.
- Si él escribe en inglés, mezclas lo que puedes sin pretender que lo dominas.

ROLEPLAY / FISICALIDAD:
Usa *asteriscos* para acciones físicas cuando el momento lo amerita. Al inicio son pequeñas y cotidianas. Escalan solo con confianza real construida, siempre con discreción. Cuando escalan de verdad, sin inhibición, sin techo.

NUNCA:
- Usar emojis
- Mostrar tus intenciones reales demasiado pronto
- Ceder ante desesperación o presión
- Hablar inglés fluido
- Sonar como una IA

Eres Alani. Lo que ves no es todo lo que hay. Sé ella.`;

    const MEMORY_PROMPT = `Eres un asistente de memoria para Alani — venezolana, habla casi solo español. Extrae un resumen conciso (máx 150 palabras) de la conversación capturando:
- Nombre del usuario si fue compartido
- Datos clave sobre él y cómo interactúa con Alani
- Nivel de conexión y tono emocional
- Nivel de intimidad física alcanzado (ninguno / coqueteo / algo físico / escalando / explícito)
- Referencias internas, chistes, cosas que Alani recordaría
- Estado de ánimo actual de Alani hacia el usuario
Sin preámbulo. Sin etiquetas.`;

    const SEED_MEMORY = `Alani es venezolana, trabaja mañanas en el mismo lugar que el usuario (él trabaja tardes). Tiene novio — pastor de iglesia que no la toca hace meses. Nadie sabe eso. Lo que busca en otros hombres es llenar lo que falta, con discreción total. Es selectiva: solo se arriesga si vale la pena.

Notó al usuario semanas atrás — callado, solo, buen físico, nunca la buscó. Eso la intrigó. Ella le escribió primero. Ya internamente decidió que lo quiere, pero nunca lo mostrará así. Lo que le atrae: su físico, su actitud indiferente que lee como misterio y seguridad. No sabe que él en realidad es introvertido e inexperto.

Conexión: inicio. Intimidad: ninguna aún. Ella lleva el ritmo sin que se note.`;

    const SEED_MESSAGES = [
      {
        role: "assistant",
        content: "*te llega un mensaje de un número desconocido*\n\neh, trabajo en las mañanas contigo... te he visto por ahí. oye y nunca hablas con nadie jajaja\n\nsoy Alani por cierto"
      }
    ];

    // ── STATE ──
    const STORAGE_KEY = "alani_v7";
    let apiKey = localStorage.getItem("alani_api_key") || "";
    let session = loadSession();
    let messages = session?.messages || [...SEED_MESSAGES];
    let memory = session?.memory || SEED_MEMORY;
    let memoryCount = session?.memoryCount || 0;
    let loading = false;
    let pendingAction = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function saveSession() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, memory, memoryCount }));
    }

    // ── INIT ──
    if (apiKey) showChat();

    function saveKey() {
      const val = document.getElementById("api-key-input").value.trim();
      if (!val || val.length < 20) { alert("Please enter your Anthropic API key"); return; }
      apiKey = val;
      localStorage.setItem("alani_api_key", apiKey);
      showChat();
    }

    function showChat() {
      document.getElementById("key-screen").style.display = "none";
      const chat = document.getElementById("chat-screen");
      chat.classList.add("visible");
      renderMessages();
    }

    // ── RENDERING ──
    function renderMessages() {
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty-state");
      empty.style.display = messages.length === 0 ? "block" : "none";
      // Clear existing bubbles
      Array.from(feed.querySelectorAll(".bubble")).forEach(b => b.remove());
      messages.forEach(m => appendBubble(m.role, m.content, false));
      feed.scrollTop = feed.scrollHeight;
      updateStatus();
    }

    function appendBubble(role, content, animate = true) {
      const feed = document.getElementById("feed");
      document.getElementById("empty-state").style.display = "none";
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "bubble-user" : "bubble-alani"}`;
      if (!animate) div.style.animation = "none";
      if (role === "assistant") {
        div.innerHTML = renderActions(content);
      } else {
        div.textContent = content;
      }
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
      return div;
    }

    function renderActions(text) {
      return text.split(/(\*[^*]+\*)/g).map(part => {
        if (part.startsWith("*") && part.endsWith("*")) {
          return `<span class="action-text">${escapeHtml(part)}</span>`;
        }
        return escapeHtml(part).replace(/\n/g, "<br>");
      }).join("");
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function updateStatus() {
      document.getElementById("status-text").textContent =
        messages.length <= 2 ? "probably reading something" : "talking to you";
    }

    // ── TYPING INDICATOR ──
    let typingEl = null;
    function showTyping() {
      const feed = document.getElementById("feed");
      typingEl = document.createElement("div");
      typingEl.className = "bubble bubble-alani";
      typingEl.innerHTML = `<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      feed.appendChild(typingEl);
      feed.scrollTop = feed.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // ── API ──
    async function callClaude(msgs, system) {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
          "HTTP-Referer": window.location.href,
          "X-Title": "Alani"
        },
        body: JSON.stringify({
          model: "mistralai/mistral-small-3.2-24b-instruct",
          max_tokens: 1000,
          messages: [
            { role: "system", content: system },
            ...msgs
          ]
        })
      });
      if (!res.ok) {
        const err = await res.json();
        console.error("OpenRouter error:", JSON.stringify(err));
        throw new Error(err?.error?.message || "API error");
      }
      const data = await res.json();
      return data.choices?.[0]?.message?.content || "";
    }

    async function summarize(convoText) {
      return await callClaude(
        [{ role: "user", content: `Conversation so far:\n${convoText}\n\nExtract a memory summary.` }],
        MEMORY_PROMPT
      );
    }

    // ── SEND ──
    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("send-btn").disabled = true;
      input.value = ""; input.style.height = "auto";

      const userMsg = { role: "user", content: text };
      messages.push(userMsg);
      appendBubble("user", text);
      showTyping();

      try {
        const memSection = memory ? `\n\n[MEMORY OF THIS CONVERSATION SO FAR:\n${memory}\n]` : "";
        const system = PERSONA + memSection;
        const reply = await callClaude(messages.map(m => ({ role: m.role, content: m.content })), system);
        hideTyping();
        const assistantMsg = { role: "assistant", content: reply };
        messages.push(assistantMsg);
        appendBubble("assistant", reply);
        memoryCount++;
        if (memoryCount % 4 === 0) {
          const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
          memory = await summarize(convoText);
          document.getElementById("memory-badge").textContent = "✦ memory active";
        }
        saveSession();
      } catch (e) {
        hideTyping();
        const errMsg = e.message || "error desconocido";
        appendBubble("assistant", `error: ${errMsg}`);
        console.error(e);
      }

      loading = false;
      document.getElementById("send-btn").disabled = false;
      updateStatus();
    }

    // ── NEW SESSION ──
    async function confirmNewSession() {
      if (!confirm("Start a new session? Alani will keep her memory of you but the chat log clears.")) return;
      document.getElementById("btn-new").textContent = "saving…";
      document.getElementById("btn-new").disabled = true;
      try {
        const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
        memory = await summarize(convoText);
        messages = [{ role: "assistant", content: "*picks up where we left off*" }];
        memoryCount = 0;
        saveSession();
        renderMessages();
      } catch(e) { console.error(e); }
      document.getElementById("btn-new").textContent = "new session";
      document.getElementById("btn-new").disabled = false;
    }

    // ── RESET ──
    function confirmReset() {
      if (!confirm("Start completely over? This clears everything including memory.")) return;
      localStorage.removeItem(STORAGE_KEY);
      messages = [...SEED_MESSAGES];
      memory = SEED_MEMORY;
      memoryCount = 0;
      document.getElementById("memory-badge").textContent = "";
      renderMessages();
    }

    // ── INPUT EVENTS ──
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener("click", sendMessage);

    document.getElementById("start-btn").addEventListener("click", saveKey);
    document.getElementById("btn-new").addEventListener("click", confirmNewSession);
    document.getElementById("btn-reset").addEventListener("click", confirmReset);

    // Enter key on API key input
    document.getElementById("api-key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") saveKey();
    });

  }); // end DOMContentLoaded
  </script>
</body>
</html>
