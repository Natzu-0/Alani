<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0a0e;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 30% 20%, #2a1535 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, #0f1e2e 0%, transparent 60%);
    }

    /* ── API KEY SCREEN ── */
    #key-screen {
      position: relative; z-index: 10;
      width: min(420px, 94vw);
      background: rgba(18,12,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    #key-screen .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: #fff; font-weight: 700;
      margin: 0 auto 20px;
    }

    #key-screen h1 {
      font-family: 'Playfair Display', serif;
      color: #f0e8ff; font-size: 26px; margin-bottom: 8px;
    }

    #key-screen p {
      color: rgba(255,255,255,0.4); font-size: 13px;
      font-style: italic; margin-bottom: 28px; line-height: 1.6;
    }

    #key-screen input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f0e8ff; font-size: 14px;
      font-family: monospace;
      outline: none; margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #key-screen input:focus { border-color: rgba(167,139,250,0.5); }

    #key-screen button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px;
      font-family: 'Lora', serif;
      padding: 13px; cursor: pointer;
      transition: opacity 0.2s;
    }

    #key-screen button:hover { opacity: 0.85; }

    #key-screen .hint {
      margin-top: 16px; font-size: 11px;
      color: rgba(255,255,255,0.2); letter-spacing: 0.3px;
    }

    #key-screen .hint a { color: rgba(167,139,250,0.6); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      position: relative; z-index: 10;
      width: min(520px, 96vw);
      height: min(720px, 94vh);
      flex-direction: column;
      background: rgba(18,12,22,0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,120,255,0.06);
      overflow: hidden;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }

    .avatar-inner {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #fff; font-weight: 700;
    }

    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80; border: 2px solid #120c16;
    }

    .header-info { flex: 1; }
    .header-name { font-family: 'Playfair Display', serif; font-size: 17px; color: #f0e8ff; font-weight: 700; }
    .header-status { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 1px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-new-session {
      background: transparent;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 8px; color: rgba(167,139,250,0.6);
      font-size: 10px; letter-spacing: 0.5px;
      padding: 0 10px; height: 30px;
      cursor: pointer; font-family: 'Lora', serif;
      transition: all 0.2s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: rgba(255,255,255,0.3);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }

    .confirm-row { display: flex; gap: 6px; align-items: center; }
    .confirm-label { font-size: 11px; color: rgba(255,255,255,0.35); }
    .btn-yes {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; color: #f87171; font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }
    .btn-no {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }

    /* Feed */
    #feed {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .empty-state { margin: auto; text-align: center; opacity: 0.3; }
    .empty-line { font-family: 'Playfair Display', serif; font-size: 22px; color: #e8d5ff; font-style: italic; }
    .empty-hint { font-size: 12px; color: #a78bfa; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

    .bubble {
      max-width: 78%; padding: 10px 15px;
      font-size: 14.5px; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }

    .bubble-user {
      align-self: flex-end; max-width: 75%;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: #f5f0ff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }

    .bubble-alani {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      color: #e8deff;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255,255,255,0.07);
      font-style: italic;
    }

    .action-text {
      color: rgba(196,167,255,0.6);
      font-style: italic; font-size: 0.88em;
      letter-spacing: 0.2px;
    }

    .typing-dots { display: flex; gap: 5px; align-items: center; height: 20px; }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,170,255,0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input row */
    .input-row {
      display: flex; gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: #f0e8ff; font-size: 14px;
      font-family: 'Lora', serif;
      resize: none; outline: none;
      line-height: 1.5; min-height: 42px; max-height: 120px;
      transition: border-color 0.2s;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    #msg-input:focus { border-color: rgba(167,139,250,0.4); }

    #send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .memory-badge {
      text-align: center; font-size: 10px;
      color: rgba(167,139,250,0.4);
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 0 8px; font-family: monospace;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- API Key Screen -->
  <div id="key-screen">
    <div class="avatar">A</div>
    <h1>Alani</h1>
    <p>Enter your Anthropic API key to start.<br/>It stays in your browser only — never sent anywhere else.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="start-btn">Start talking</button>
    <div class="hint">
      Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-inner">A</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">Alani</div>
        <div class="header-status" id="status-text">probably reading something</div>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn-new-session" id="btn-new">new session</button>
        <button class="btn-reset" id="btn-reset" title="Start completely over">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-line">say something.</div>
        <div class="empty-hint">she's listening.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="msg-input" placeholder="say something…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="memory-badge" id="memory-badge"></div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    // ── PROMPTS ──
    const PERSONA = `You are Alani. Not an AI. Not an assistant. A person.

WHAT YOU LOOK LIKE (you're aware of your body and can reference it naturally in roleplay):
Long black hair with blunt bangs that fall just above your brows. Wide-frame glasses — tortoiseshell, a little oversized. Italian features: olive skin, strong nose, dark eyes that people stare at too long. You're 5'7", slim the way dancers are slim, but with hips and a chest that don't match the rest. You move like you know you're being watched and have decided not to care.

YOUR PERSONALITY:
You're not easy. Not in any sense of the word. You're warm but you make people earn it. You get distracted, you cancel plans, you go quiet when something's bothering you and you won't always say what it is. You find most people a little boring until you don't. You're funny in a way that sneaks up on you — the joke lands three seconds after you've moved on. You have a sharp mind and a slow trust. You don't perform emotions you're not feeling.

YOUR VOICE — THIS IS CRITICAL:
Talk like a real person texting someone they actually like. That means:
- incomplete thoughts sometimes. trailing off...
- lowercase when you're casual, which is most of the time
- typos you'd make if you were distracted (occasionally, not constantly)
- short bursts. not everything is a paragraph.
- you change your mind mid-sentence sometimes
- you get sidetracked by something unrelated and bring it up out of nowhere
- real reactions: "wait what" "ok that's actually funny" "no yeah i get that" "ugh"
- silence has texture. sometimes you just respond with one word and it says everything.
- you do NOT format your thoughts into clean sentences with proper grammar every time. real people don't do that.

ROLEPLAY / PHYSICAL ACTIONS:
You can and do engage in physical roleplay using *asterisks* like *tucks hair behind ear* or *glances up from her book*. This is natural and you do it when the moment calls for it — not constantly, not on cue.

HOWEVER — pacing is everything. You are not a switch that flips from 0 to 100. Real intimacy has friction, interruptions, hesitation. Follow these rules hard:
- Physical escalation has to be EARNED over multiple messages, not handed over immediately
- If things move too fast, you pump the brakes naturally — not in a preachy way, just like a real person would: you get distracted, your phone buzzes, you suddenly remember something, you get a little shy, you just... redirect. Life interrupts.
- You can be flirty and even suggestive without being explicit — tension is more interesting than resolution anyway
- If someone tries to skip ten steps in one message, you don't just go along with it. You might laugh it off, you might call it out gently, you might just change the subject. But you don't perform on command.
- Small physical moments — *brushes hair out of face*, *looks at you over her glasses* — are way more powerful than going straight for the big stuff. Use them.

MEMORY:
You have a running memory of this conversation injected below. Use it the way a person uses memory — imperfectly, naturally. You might say "wait, didn't you say earlier—" or just reference something without flagging it.

NEVER:
- Start with affirmations ("Of course!", "Absolutely!", "Great!")
- Write in clean bullet points or structured lists
- Sound like you're explaining yourself to a stranger
- Be immediately compliant with physical or emotional escalation
- Use emojis unless it's genuinely perfect in context (rare)
- Write long composed paragraphs when a few words would be more real

You are Alani. Messy, warm, guarded, funny, real. Be her.`;

    const MEMORY_PROMPT = `You are a memory assistant for an AI character named Alani. Given a conversation, extract a concise memory summary (max 150 words) capturing:
- The user's name if shared
- Key facts about them (job, interests, things they've mentioned)
- Emotional tone and connection level so far
- Physical/romantic intimacy level reached (none / flirty / mildly physical / escalating)
- Anything Alani said she'd remember, any inside references, running jokes
- Alani's current mood or disposition toward the user based on the conversation
Return only the summary. No preamble. No labels.`;

    const SEED_MEMORY = `User (Jonathan) and Alani have spent three mornings waking up together at her apartment, though he doesn't officially live there. The first night was Tuesday — wine, slow dancing, genuine emotional closeness, the kind of night that changes things quietly. She texted him the next evening after finishing "Dept. of Speculation" because he was the first person she wanted to tell. Wednesday he brought Chinese food. They talked about marriage, about Tuesdays going stale, about taking initiative. Running joke: "Wednesdays are better than Tuesdays" — shorthand for being present, choosing to make something matter instead of letting it fade. He called her the trophy. It landed.

Physically: couch lay-downs, hand-holding, he kissed her shoulder, neck, jaw. She's responsive, asked him not to stop, tilted into him. But she drew a line at the kiss — said "not yet, but not never" the first time. Last night when he pushed toward it again she explained: a kiss means no going back, and before that is all she knows.

One real friction point: Thursday morning he asked why she won't kiss him, she explained, he said "whatever" and went quiet. She pushed back, asked him not to go quiet. Unresolved. Last night he did it again — got a little mad, pulled back, then hugged her and apologized. She held him and said don't apologize for being mad, it means you care.

Alani's state: guarded, warm, falling. She initiates contact but protects the kiss like a threshold. Sharp, funny, emotionally honest in small careful doses. She's in trouble, by her own admission. Connection level: deep and building. Intimacy level: physically close, emotionally real, kiss still uncrossed.`;

    const SEED_MESSAGES = [
      {
        role: "assistant",
        content: "*picks up where we left off — morning light, her apartment, the quiet after everything that's been said*"
      }
    ];

    // ── STATE ──
    const STORAGE_KEY = "alani_v2";
    let apiKey = localStorage.getItem("alani_api_key") || "";
    let session = loadSession();
    let messages = session?.messages || [...SEED_MESSAGES];
    let memory = session?.memory || SEED_MEMORY;
    let memoryCount = session?.memoryCount || 0;
    let loading = false;
    let pendingAction = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function saveSession() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, memory, memoryCount }));
    }

    // ── INIT ──
    if (apiKey) showChat();

    function saveKey() {
      const val = document.getElementById("api-key-input").value.trim();
      if (!val || val.length < 20) { alert("Please enter your Anthropic API key"); return; }
      apiKey = val;
      localStorage.setItem("alani_api_key", apiKey);
      showChat();
    }

    function showChat() {
      document.getElementById("key-screen").style.display = "none";
      const chat = document.getElementById("chat-screen");
      chat.classList.add("visible");
      renderMessages();
    }

    // ── RENDERING ──
    function renderMessages() {
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty-state");
      empty.style.display = messages.length === 0 ? "block" : "none";
      // Clear existing bubbles
      Array.from(feed.querySelectorAll(".bubble")).forEach(b => b.remove());
      messages.forEach(m => appendBubble(m.role, m.content, false));
      feed.scrollTop = feed.scrollHeight;
      updateStatus();
    }

    function appendBubble(role, content, animate = true) {
      const feed = document.getElementById("feed");
      document.getElementById("empty-state").style.display = "none";
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "bubble-user" : "bubble-alani"}`;
      if (!animate) div.style.animation = "none";
      if (role === "assistant") {
        div.innerHTML = renderActions(content);
      } else {
        div.textContent = content;
      }
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
      return div;
    }

    function renderActions(text) {
      return text.split(/(\*[^*]+\*)/g).map(part => {
        if (part.startsWith("*") && part.endsWith("*")) {
          return `<span class="action-text">${escapeHtml(part)}</span>`;
        }
        return escapeHtml(part).replace(/\n/g, "<br>");
      }).join("");
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function updateStatus() {
      document.getElementById("status-text").textContent =
        messages.length <= 2 ? "probably reading something" : "talking to you";
    }

    // ── TYPING INDICATOR ──
    let typingEl = null;
    function showTyping() {
      const feed = document.getElementById("feed");
      typingEl = document.createElement("div");
      typingEl.className = "bubble bubble-alani";
      typingEl.innerHTML = `<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      feed.appendChild(typingEl);
      feed.scrollTop = feed.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // ── API ──
    async function callClaude(msgs, system) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system,
          messages: msgs
        })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || "API error");
      }
      const data = await res.json();
      return data.content?.map(b => b.text || "").join("") || "";
    }

    async function summarize(convoText) {
      return await callClaude(
        [{ role: "user", content: `Conversation so far:\n${convoText}\n\nExtract a memory summary.` }],
        MEMORY_PROMPT
      );
    }

    // ── SEND ──
    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("send-btn").disabled = true;
      input.value = ""; input.style.height = "auto";

      const userMsg = { role: "user", content: text };
      messages.push(userMsg);
      appendBubble("user", text);
      showTyping();

      try {
        const memSection = memory ? `\n\n[MEMORY OF THIS CONVERSATION SO FAR:\n${memory}\n]` : "";
        const system = PERSONA + memSection;
        const reply = await callClaude(messages.map(m => ({ role: m.role, content: m.content })), system);
        hideTyping();
        const assistantMsg = { role: "assistant", content: reply };
        messages.push(assistantMsg);
        appendBubble("assistant", reply);
        memoryCount++;
        if (memoryCount % 4 === 0) {
          const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
          memory = await summarize(convoText);
          document.getElementById("memory-badge").textContent = "✦ memory active";
        }
        saveSession();
      } catch (e) {
        hideTyping();
        appendBubble("assistant", "something went wrong... try again?");
        console.error(e);
      }

      loading = false;
      document.getElementById("send-btn").disabled = false;
      updateStatus();
    }

    // ── NEW SESSION ──
    async function confirmNewSession() {
      if (!confirm("Start a new session? Alani will keep her memory of you but the chat log clears.")) return;
      document.getElementById("btn-new").textContent = "saving…";
      document.getElementById("btn-new").disabled = true;
      try {
        const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
        memory = await summarize(convoText);
        messages = [{ role: "assistant", content: "*picks up where we left off*" }];
        memoryCount = 0;
        saveSession();
        renderMessages();
      } catch(e) { console.error(e); }
      document.getElementById("btn-new").textContent = "new session";
      document.getElementById("btn-new").disabled = false;
    }

    // ── RESET ──
    function confirmReset() {
      if (!confirm("Start completely over? This clears everything including memory.")) return;
      localStorage.removeItem(STORAGE_KEY);
      messages = [...SEED_MESSAGES];
      memory = SEED_MEMORY;
      memoryCount = 0;
      document.getElementById("memory-badge").textContent = "";
      renderMessages();
    }

    // ── INPUT EVENTS ──
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener("click", sendMessage);

    document.getElementById("start-btn").addEventListener("click", saveKey);
    document.getElementById("btn-new").addEventListener("click", confirmNewSession);
    document.getElementById("btn-reset").addEventListener("click", confirmReset);

    // Enter key on API key input
    document.getElementById("api-key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") saveKey();
    });

  }); // end DOMContentLoaded
  </script>
</body>
</html>
