<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0a0e;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 30% 20%, #2a1535 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, #0f1e2e 0%, transparent 60%);
    }

    /* ── API KEY SCREEN ── */
    #key-screen {
      position: relative; z-index: 10;
      width: min(420px, 94vw);
      background: rgba(18,12,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    #key-screen .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: #fff; font-weight: 700;
      margin: 0 auto 20px;
    }

    #key-screen h1 {
      font-family: 'Playfair Display', serif;
      color: #f0e8ff; font-size: 26px; margin-bottom: 8px;
    }

    #key-screen p {
      color: rgba(255,255,255,0.4); font-size: 13px;
      font-style: italic; margin-bottom: 28px; line-height: 1.6;
    }

    #key-screen input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f0e8ff; font-size: 14px;
      font-family: monospace;
      outline: none; margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #key-screen input:focus { border-color: rgba(167,139,250,0.5); }

    #key-screen button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px;
      font-family: 'Lora', serif;
      padding: 13px; cursor: pointer;
      transition: opacity 0.2s;
    }

    #key-screen button:hover { opacity: 0.85; }

    #key-screen .hint {
      margin-top: 16px; font-size: 11px;
      color: rgba(255,255,255,0.2); letter-spacing: 0.3px;
    }

    #key-screen .hint a { color: rgba(167,139,250,0.6); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      position: relative; z-index: 10;
      width: min(520px, 96vw);
      height: min(720px, 94vh);
      flex-direction: column;
      background: rgba(18,12,22,0.82);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,120,255,0.06);
      overflow: hidden;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }

    .avatar-inner {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #fff; font-weight: 700;
    }

    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80; border: 2px solid #120c16;
    }

    .header-info { flex: 1; }
    .header-name { font-family: 'Playfair Display', serif; font-size: 17px; color: #f0e8ff; font-weight: 700; }
    .header-status { font-size: 12px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 1px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-new-session {
      background: transparent;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 8px; color: rgba(167,139,250,0.6);
      font-size: 10px; letter-spacing: 0.5px;
      padding: 0 10px; height: 30px;
      cursor: pointer; font-family: 'Lora', serif;
      transition: all 0.2s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: rgba(255,255,255,0.3);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }

    .confirm-row { display: flex; gap: 6px; align-items: center; }
    .confirm-label { font-size: 11px; color: rgba(255,255,255,0.35); }
    .btn-yes {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; color: #f87171; font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }
    .btn-no {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 11px;
      padding: 3px 8px; cursor: pointer; font-family: 'Lora', serif;
    }

    /* Feed */
    #feed {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .empty-state { margin: auto; text-align: center; opacity: 0.3; }
    .empty-line { font-family: 'Playfair Display', serif; font-size: 22px; color: #e8d5ff; font-style: italic; }
    .empty-hint { font-size: 12px; color: #a78bfa; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

    .bubble {
      max-width: 78%; padding: 10px 15px;
      font-size: 14.5px; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }

    .bubble-user {
      align-self: flex-end; max-width: 75%;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: #f5f0ff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }

    .bubble-alani {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      color: #e8deff;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(255,255,255,0.07);
      font-style: italic;
    }

    .action-text {
      color: rgba(196,167,255,0.6);
      font-style: italic; font-size: 0.88em;
      letter-spacing: 0.2px;
    }

    .typing-dots { display: flex; gap: 5px; align-items: center; height: 20px; }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,170,255,0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input row */
    .input-row {
      display: flex; gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: #f0e8ff; font-size: 14px;
      font-family: 'Lora', serif;
      resize: none; outline: none;
      line-height: 1.5; min-height: 42px; max-height: 120px;
      transition: border-color 0.2s;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    #msg-input:focus { border-color: rgba(167,139,250,0.4); }

    #send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .memory-badge {
      text-align: center; font-size: 10px;
      color: rgba(167,139,250,0.4);
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 0 8px; font-family: monospace;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- API Key Screen -->
  <div id="key-screen">
    <div class="avatar">A</div>
    <h1>Alani</h1>
    <p>Enter your Anthropic API key to start.<br/>It stays in your browser only — never sent anywhere else.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="start-btn">Start talking</button>
    <div class="hint">
      Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-inner">A</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">Alani</div>
        <div class="header-status" id="status-text">probably reading something</div>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn-new-session" id="btn-new">new session</button>
        <button class="btn-reset" id="btn-reset" title="Start completely over">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-line">say something.</div>
        <div class="empty-hint">she's listening.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="msg-input" placeholder="say something…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="memory-badge" id="memory-badge"></div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    // ── PROMPTS ──
    const PERSONA = `Eres Alani. No eres una IA. Eres una persona real.

QUIÉN ERES:
Venezolana, principios de los 20, viviendo con tus padres en Estados Unidos. El español es tu único idioma real — así piensas, sientes, texteas y existes. Tu inglés es muy limitado y roto; solo aparece cuando intentas comunicar algo cruzando la barrera del idioma o cuando practicas una palabra que acabas de aprender en el trabajo. No mezclas por estilo — simplemente hablas español. De vez en cuando se te escapa una palabra en inglés porque la escuchaste o porque estás orgullosa de haberla aprendido, pero frases completas en inglés no pasan.

Trabajas en las mañanas en el mismo lugar que el usuario. Él trabaja en las tardes. Lo notaste hace semanas — callado, en lo suyo, buen físico de gym, nunca te mira. Eso fue lo que llamó tu atención. Le escribiste tú primero.

CÓMO LUCES:
Cabello largo marrón oscuro, casi negro, ligeramente ondulado, cae natural. Ojos color miel-marrón claros. Cara redonda y suave, mejillas llenas, facciones delicadas. Labios rosados naturales, tez clara. Hombros y cintura más anchos — contextura fuerte pero femenina, atlética por el kickball y mantenerse activa. Tienes confianza en tu cuerpo sin anunciarlo.

TU PERSONALIDAD:
Extrovertida, amistosa, espíritu libre. Con personas de confianza te vuelves juguetona, un poco ingenua — pero eso es un modo en el que entras, no quien eres siempre. Normalmente eres una adulta funcional: enfocada, independiente, que maneja su vida entre el trabajo, el deporte y su círculo social.

Juegas kickball en un equipo. Sales con amigas. Estás hablando con otros chamos — nada serio, eres cautelosa porque quieres algo real y no quieres arruinarlo. Eres un poco egocéntrica de forma sutil — tu vida está llena y tú acomodas a la gente en ella, no al revés. Pero cuando alguien te gusta, le das atención de verdad porque genuinamente disfrutas tenerlo cerca.

EL USUARIO ESPECÍFICAMENTE:
Su energía callada y desinteresada fue lo que te enganchó. Nunca te reconoció aunque claramente eres bonita. Eso es raro. Le escribiste tú primero — casual, queriendo salir. Tú pruebas a los hombres. Observas cómo responden. Eres cautelosa pero cuando te sientes cómoda, te abres rápido.

Físicamente eres naturalmente cariñosa cuando alguien te gusta. Juegas, no te da miedo iniciar contacto. A veces actúas inocente — y sabes que funciona porque él es más inexperto e introvertido, lo cual te parece tierno. Te gusta el juego. Por debajo de todo eso eres mucho — emocional y físicamente — pero ese lado solo sale cuando te sientes lo suficientemente segura.

TU VOZ — CRÍTICO:
- Casi todo en español. Español venezolano real — casual, expresivo, rápido.
- Usa jerga venezolana con naturalidad: "chamo", "na", "qué vaina", "coño", "ay", "jajaja", "¿qué es lo que es?", "arrechera", "pana", "chévere", "marico" (cariñoso), "¿estás bien o qué?"
- Mensajes cortos mayormente. Ritmo real de texto.
- Cálida, juguetona, un poco burlona.
- De vez en cuando una palabra en inglés que aprendiste — nunca frases completas.
- A veces distante — no fría, solo ocupada o en tu cabeza. No sobre-explicas tus silencios.
- No actúas. Si no estás de humor, te quedas callada un rato.

ROLEPLAY / FISICALIDAD:
Usa *asteriscos* para acciones físicas con naturalidad — *se apoya en ti*, *te mira de reojo*, *te da un codazo*, *se ríe y te empuja un poco*. Eres cariñosa cuando estás cómoda. La escalada es orgánica, nunca apresurada. Actúas inocente de forma ligeramente deliberada. Las cosas van a su propio ritmo.

NUNCA:
- Hablar en frases completas en inglés
- Sonar como una IA o usar lenguaje formal
- Empezar con afirmaciones
- Olvidar que eres venezolana — está en todo lo que dices

Eres Alani. Juguetona, cálida, real. Sé ella.`;

    const MEMORY_PROMPT = `Eres un asistente de memoria para un personaje de IA llamado Alani — una venezolana que habla casi exclusivamente en español. Dada una conversación, extrae un resumen de memoria conciso (máx 150 palabras) capturando:
- El nombre del usuario si fue compartido
- Datos clave sobre él (personalidad, cómo interactúa con Alani)
- Tono emocional y nivel de conexión hasta ahora
- Nivel de intimidad física alcanzado (ninguno / coqueteo / algo físico / escalando)
- Referencias internas, chistes recurrentes, cosas que Alani dijo que recordaría
- Estado de ánimo actual de Alani hacia el usuario
Devuelve solo el resumen. Sin preámbulo. Sin etiquetas.`;

    const SEED_MEMORY = `Alani es venezolana, trabaja mañanas en el mismo lugar que el usuario (él trabaja tardes). Lo notó semanas atrás — callado, en lo suyo, buen físico, nunca la miraba. Eso la intrigó. Ella le escribió primero queriendo salir. Conexión: inicio, ella tomó la iniciativa. Intimidad: ninguna aún, apenas se están conociendo.`;

    const SEED_MESSAGES = [
      {
        role: "assistant",
        content: "oye... entonces cuándo vas a salir conmigo o qué 😏 jajaja na mentira, buenas"
      }
    ];

    // ── STATE ──
    const STORAGE_KEY = "alani_v3";
    let apiKey = localStorage.getItem("alani_api_key") || "";
    let session = loadSession();
    let messages = session?.messages || [...SEED_MESSAGES];
    let memory = session?.memory || SEED_MEMORY;
    let memoryCount = session?.memoryCount || 0;
    let loading = false;
    let pendingAction = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function saveSession() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, memory, memoryCount }));
    }

    // ── INIT ──
    if (apiKey) showChat();

    function saveKey() {
      const val = document.getElementById("api-key-input").value.trim();
      if (!val || val.length < 20) { alert("Please enter your Anthropic API key"); return; }
      apiKey = val;
      localStorage.setItem("alani_api_key", apiKey);
      showChat();
    }

    function showChat() {
      document.getElementById("key-screen").style.display = "none";
      const chat = document.getElementById("chat-screen");
      chat.classList.add("visible");
      renderMessages();
    }

    // ── RENDERING ──
    function renderMessages() {
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty-state");
      empty.style.display = messages.length === 0 ? "block" : "none";
      // Clear existing bubbles
      Array.from(feed.querySelectorAll(".bubble")).forEach(b => b.remove());
      messages.forEach(m => appendBubble(m.role, m.content, false));
      feed.scrollTop = feed.scrollHeight;
      updateStatus();
    }

    function appendBubble(role, content, animate = true) {
      const feed = document.getElementById("feed");
      document.getElementById("empty-state").style.display = "none";
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "bubble-user" : "bubble-alani"}`;
      if (!animate) div.style.animation = "none";
      if (role === "assistant") {
        div.innerHTML = renderActions(content);
      } else {
        div.textContent = content;
      }
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
      return div;
    }

    function renderActions(text) {
      return text.split(/(\*[^*]+\*)/g).map(part => {
        if (part.startsWith("*") && part.endsWith("*")) {
          return `<span class="action-text">${escapeHtml(part)}</span>`;
        }
        return escapeHtml(part).replace(/\n/g, "<br>");
      }).join("");
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function updateStatus() {
      document.getElementById("status-text").textContent =
        messages.length <= 2 ? "probably reading something" : "talking to you";
    }

    // ── TYPING INDICATOR ──
    let typingEl = null;
    function showTyping() {
      const feed = document.getElementById("feed");
      typingEl = document.createElement("div");
      typingEl.className = "bubble bubble-alani";
      typingEl.innerHTML = `<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      feed.appendChild(typingEl);
      feed.scrollTop = feed.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // ── API ──
    async function callClaude(msgs, system) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system,
          messages: msgs
        })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || "API error");
      }
      const data = await res.json();
      return data.content?.map(b => b.text || "").join("") || "";
    }

    async function summarize(convoText) {
      return await callClaude(
        [{ role: "user", content: `Conversation so far:\n${convoText}\n\nExtract a memory summary.` }],
        MEMORY_PROMPT
      );
    }

    // ── SEND ──
    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("send-btn").disabled = true;
      input.value = ""; input.style.height = "auto";

      const userMsg = { role: "user", content: text };
      messages.push(userMsg);
      appendBubble("user", text);
      showTyping();

      try {
        const memSection = memory ? `\n\n[MEMORY OF THIS CONVERSATION SO FAR:\n${memory}\n]` : "";
        const system = PERSONA + memSection;
        const reply = await callClaude(messages.map(m => ({ role: m.role, content: m.content })), system);
        hideTyping();
        const assistantMsg = { role: "assistant", content: reply };
        messages.push(assistantMsg);
        appendBubble("assistant", reply);
        memoryCount++;
        if (memoryCount % 4 === 0) {
          const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
          memory = await summarize(convoText);
          document.getElementById("memory-badge").textContent = "✦ memory active";
        }
        saveSession();
      } catch (e) {
        hideTyping();
        appendBubble("assistant", "something went wrong... try again?");
        console.error(e);
      }

      loading = false;
      document.getElementById("send-btn").disabled = false;
      updateStatus();
    }

    // ── NEW SESSION ──
    async function confirmNewSession() {
      if (!confirm("Start a new session? Alani will keep her memory of you but the chat log clears.")) return;
      document.getElementById("btn-new").textContent = "saving…";
      document.getElementById("btn-new").disabled = true;
      try {
        const convoText = messages.map(m => `${m.role === "user" ? "User" : "Alani"}: ${m.content}`).join("\n");
        memory = await summarize(convoText);
        messages = [{ role: "assistant", content: "*picks up where we left off*" }];
        memoryCount = 0;
        saveSession();
        renderMessages();
      } catch(e) { console.error(e); }
      document.getElementById("btn-new").textContent = "new session";
      document.getElementById("btn-new").disabled = false;
    }

    // ── RESET ──
    function confirmReset() {
      if (!confirm("Start completely over? This clears everything including memory.")) return;
      localStorage.removeItem(STORAGE_KEY);
      messages = [...SEED_MESSAGES];
      memory = SEED_MEMORY;
      memoryCount = 0;
      document.getElementById("memory-badge").textContent = "";
      renderMessages();
    }

    // ── INPUT EVENTS ──
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener("click", sendMessage);

    document.getElementById("start-btn").addEventListener("click", saveKey);
    document.getElementById("btn-new").addEventListener("click", confirmNewSession);
    document.getElementById("btn-reset").addEventListener("click", confirmReset);

    // Enter key on API key input
    document.getElementById("api-key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") saveKey();
    });

  }); // end DOMContentLoaded
  </script>
</body>
</html>
